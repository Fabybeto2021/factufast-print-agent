name: Build & Release PrintAgent

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Descargar SumatraPDF portable
        run: |
          mkdir -p vendor
          curl.exe -L "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.exe" -o vendor/SumatraPDF.exe
        shell: bash

      - name: Compilar TypeScript
        run: npm run build

      # --publish always: sube .exe + latest.yml al GitHub Release (necesario para electron-updater)
      - name: Build y publicar instalador Windows
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Descargar SumatraPDF portable
        run: |
          mkdir -p vendor
          curl -L "https://www.sumatrapdfreader.org/dl/rel/3.5.2/SumatraPDF-3.5.2-64.exe" -o vendor/SumatraPDF.exe

      - name: Compilar TypeScript
        run: npm run build

      - name: Build y publicar AppImage Linux
        run: npx electron-builder --linux AppImage --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
